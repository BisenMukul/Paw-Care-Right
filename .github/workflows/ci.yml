name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pawcareright
          POSTGRES_PASSWORD: pawcareright
          POSTGRES_DB: pawcareright
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pawcareright -d pawcareright"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://pawcareright:pawcareright@localhost:5432/pawcareright?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.34.3 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm i --frozen-lockfile # triggers api postinstall `prisma generate` (no DB needed to generate)
      # MinIO must be a docker-run step (not a service container): GH Actions
      # services cannot pass the mandatory `server /data` command. Creds mirror
      # docker-compose; env.schema S3_* defaults already point at localhost:9000.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=pawcareright -e MINIO_ROOT_PASSWORD=pawcareright-dev-secret \
            minio/minio:RELEASE.2024-11-07T00-52-20Z server /data
          for i in $(seq 1 30); do curl -sf http://localhost:9000/minio/health/live && break; sleep 2; done
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
  # STUB — activates at T040 (packages/ai); turbo no-op today (0 tasks → exit 0).
  ai-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.34.3 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm i --frozen-lockfile
      - run: pnpm test:ai-evals
