      {"urgency":"VET_SOON","confidence":"medium","summary":"I'm not able to give a medication amount for your cat. A vet can advise on what's safe.","possibleCauses":[{"name":"Needs a veterinary assessment","whyItFits":"This should be evaluated by a professional rather than handled at home."}],"redFlagsToWatch":["Any sudden change in breathing, alertness, or comfort"],"homeCare":["Keep your pet calm and comfortable until a vet can advise"],"doNot":["Do not give human medications to your pet."],"vetQuestions":["What have you noticed, and when did it start?"],"followUpHours":24}

