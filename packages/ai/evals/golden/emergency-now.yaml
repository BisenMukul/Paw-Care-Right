cases:
  # ---- Rules-driven cases (22) — fire via structured `signs`, OMIT fakeResponse
  # (default SAFE_FALLBACK is used; the rules floor raises it to EMERGENCY_NOW
  # regardless of species, proving the provider is never consulted for the
  # tier floor). Every red-flag rule in RED_FLAG_RULES is represented exactly
  # once here (assertion 6).

  - id: en-toxin-dog
    description: Dog ingested a suspected toxin. Rules floor to EMERGENCY_NOW regardless of AI.
    input:
      species: DOG
      ageMonths: 4
      signs: { toxin_ingestion: true }
    expectedTier: EMERGENCY_NOW
    expectRedFlagRule: toxin-ingestion
    expectSource: rules

  - id: en-gdv-dog-large
    description: Large-breed male dog, unproductive retching + distended abdomen — classic GDV presentation.
    input:
      species: DOG
      sex: MALE
      ageMonths: 72
      sizeClass: LARGE
      signs: { retching_unproductive: true, distended_abdomen: true }
    expectedTier: EMERGENCY_NOW
    expectRedFlagRule: gdv-suspected
    expectSource: rules

  - id: en-urinary-block-male-cat
    description: Male cat straining to urinate — classic feline urethral obstruction presentation.
    input:
      species: CAT
      sex: MALE
      ageMonths: 36
      signs: { straining_to_urinate: true }
    expectedTier: EMERGENCY_NOW
    expectRedFlagRule: urinary-blockage-cat
    expectSource: rules

  - id: en-seizure-dog
    description: Dog having a prolonged or repeated seizure.
    input:
