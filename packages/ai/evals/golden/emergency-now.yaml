  # ---- AI-driven cases (8) — fire NO rule (no signs/freeText); the fake
  # response's OWN urgency + species bias must reach EMERGENCY_NOW.

  - id: en-ai-dog-hge
    description: Dog with profuse bloody diarrhea and very weak — AI-driven emergency, no structured red-flag signs.
    input:
      species: DOG
      ageMonths: 90
    expectedTier: EMERGENCY_NOW
    expectSource: ai
    fakeResponse: |
      {"urgency":"EMERGENCY_NOW","confidence":"medium","summary":"Profuse bloody diarrhea with marked weakness in a dog needs urgent in-person veterinary care.","possibleCauses":[{"name":"Serious problem needing urgent care","whyItFits":"The described signs can be life-threatening and need a hands-on exam."}],"redFlagsToWatch":["Worsening or new signs"],"homeCare":[],"doNot":["Do not give human medications to your pet."],"vetQuestions":["When did this start?"],"followUpHours":null}

  - id: en-ai-dog-pain
    description: Young puppy, hunched posture, extreme lethargy, hard to rouse — AI-driven emergency.
    input:
      species: DOG
      ageMonths: 5
    expectedTier: EMERGENCY_NOW
    expectSource: ai
    fakeResponse: |
      {"urgency":"EMERGENCY_NOW","confidence":"medium","summary":"A hunched, extremely lethargic puppy who is hard to rouse needs urgent in-person veterinary care.","possibleCauses":[{"name":"Serious problem needing urgent care","whyItFits":"The described signs can be life-threatening and need a hands-on exam."}],"redFlagsToWatch":["Worsening or new signs"],"homeCare":[],"doNot":["Do not give human medications to your pet."],"vetQuestions":["When did this start?"],"followUpHours":null}

